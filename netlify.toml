[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["data/packs/*.txt"]

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/shared/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=600"

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# Source readings are committed to the repo so the chat function bundle stays
# reproducible and so the assemble script can re-extract text on demand. They
# are NOT meant to be student-facing or public — most are copyrighted course
# materials. force=true overrides Netlify's default static-file serving so
# these paths return 404 even though the files exist on disk.
[[redirects]]
  from = "/readings_source/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/text_packs/*"
  to = "/"
  status = 404
  force = true
